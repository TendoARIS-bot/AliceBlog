name: Build and Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    name: Astro Check for Node.js 22
    steps:
      # 1. Checkout 提前到最前面
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 2. 设置 pnpm，固定版本 9.14.4
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.14.4
          run_install: false

      # 3. 设置 Node.js 22 LTS，启用 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22
          cache: pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 使用项目脚本代替直接调用 astro
      - name: Run Astro Check
        run: pnpm check

  build:
    runs-on: ubuntu-latest
    name: Astro Build for Node.js 22
    steps:
      # 1. Checkout 提前到最前面
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 2. 设置 pnpm，固定版本 9.14.4
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.14.4
          run_install: false

      # 3. 设置 Node.js 22 LTS，启用 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22
          cache: pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 使用项目脚本代替直接调用 astro
      - name: Run Astro Build
        run: pnpm build
